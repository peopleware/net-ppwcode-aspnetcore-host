name: Publish to NuGet

on:
  push:
    tags:
      - 'I/[0-9]+.[0-9]+.[0-9]+'
      - 'I/[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  build:
    name: Build - ${{ matrix.name-suffix }}
    runs-on: ${{ matrix.os }}
    permissions:
      checks: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
        include:
          - os: ubuntu-latest
            name-suffix: 'Linux'
          - os: macos-latest
            name-suffix: 'macOS'
          - os: windows-2022
            name-suffix: 'Windows'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          global-json-file: ./global.json

      - name: Restore dependencies
        shell: bash
        run: |
          dotnet restore PPWCode.AspNetCore.Host.sln \
            --locked-mode \
            -p:Configuration=Release

      - name: Build
        shell: bash
        run: |
          dotnet build PPWCode.AspNetCore.Host.sln \
            --configuration Release \
            --no-restore \
            -p:ContinuousIntegrationBuild=true

  publish:
    needs: build
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          # Extract full tag (e.g., I/1.2.3 or II/2.0.0-beta1)
          FULL_TAG=${GITHUB_REF#refs/tags/}

          # Validate tag format with roman numeral prefix
          if [[ ! $FULL_TAG =~ ^I/[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "ERROR: Tag '$FULL_TAG' does not match format {ROMAN}/{VERSION}"
            echo "Expected format: I/1.2.3 or I/2.0.0-beta1"
            exit 1
          fi

          # Extract version part (strip roman numeral prefix)
          VERSION=${FULL_TAG#*/}

          # Extract commit hash (short)
          COMMIT_HASH=$(git rev-parse --short HEAD)

          # Extract major version for AssemblyVersion (e.g., 1.2.3 -> 1.0.0.0)
          if [[ $VERSION =~ ^([0-9]+) ]]; then
            ASSEMBLY_VERSION="${BASH_REMATCH[1]}.0.0.0"
          fi

          # InformationalVersion = semantic version + commit hash
          INFORMATIONAL_VERSION="${VERSION}+${COMMIT_HASH}"

          # Detect if this is a pre-release version
          if [[ $VERSION =~ - ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi

          # Extract major.minor.patch and create cleaned version string
          if [[ $VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            VERSION_TRIMMED="${MAJOR}.${MINOR}.${PATCH}"
            VERSION_CLEAN="_${MAJOR}_${MINOR}_${PATCH}"
          else
            VERSION_TRIMMED=""
            VERSION_CLEAN=""
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_trimmed=$VERSION_TRIMMED" >> $GITHUB_OUTPUT
          echo "assembly_version=$ASSEMBLY_VERSION" >> $GITHUB_OUTPUT
          echo "informational_version=$INFORMATIONAL_VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "version_clean=$VERSION_CLEAN" >> $GITHUB_OUTPUT
          echo "Using tag: $FULL_TAG"
          echo "Version: $VERSION"
          echo "Version trimmed: $VERSION_TRIMMED"
          echo "AssemblyVersion: $ASSEMBLY_VERSION"
          echo "InformationalVersion: $INFORMATIONAL_VERSION"
          echo "Is pre-release: $IS_PRERELEASE"
          echo "Version clean: $VERSION_CLEAN"

      - name: Create release notes
        id: create_release_notes
        run: |
          CHANGELOG_FILE="docs/modules/ROOT/partials/changelog-${{ steps.get_version.outputs.version_trimmed }}.adoc"
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "ERROR: Changelog file '$CHANGELOG_FILE' not found."
            exit 1
          fi

          # Remove GitHub links as GitHub generates these automatically
          # Example: link:{github-user}rvdginste[@rvdginste]
          sed -i -E 's/link:\{github-[^}]+\}[^[]*\[([^]]+)\]/\1/g' "$CHANGELOG_FILE"

          # Convert AsciiDoc to Markdown using downdoc
          npx downdoc "$CHANGELOG_FILE" -o release_notes.md

          # Build the release body
          {
            cat release_notes.md
            echo ""
            echo ""
            echo "<br />"
            echo ""
            echo "[View full changelog →](https://peopleware.github.io/net-ppwcode-docs/ppwcode-aspnetcore-host-i/changelog.html#${{ steps.get_version.outputs.version_clean }})"
          } > release_body.md

      - name: Add Release Notes to Job Summary
        run: |
          if [ -f release_body.md ]; then
            cat release_body.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          global-json-file: ./global.json

      - name: Restore dependencies
        shell: bash
        run: |
          dotnet restore PPWCode.AspNetCore.Host.sln \
            --locked-mode \
            -p:Configuration=Release

      - name: Build
        shell: bash
        run: |
          dotnet build PPWCode.AspNetCore.Host.sln \
            --configuration Release \
            --no-restore \
            -p:ContinuousIntegrationBuild=true \
            -p:Version=${{ steps.get_version.outputs.version }} \
            -p:AssemblyVersion=${{ steps.get_version.outputs.assembly_version }} \
            -p:InformationalVersion=${{ steps.get_version.outputs.informational_version }}

      - name: Pack
        shell: bash
        run: |
          dotnet pack PPWCode.AspNetCore.Host.sln \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            -p:PackageVersion=${{ steps.get_version.outputs.version }}

      - name: NuGet login (OIDC for temp api key)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ secrets.PPWCODE_NUGET_USER }}

      - name: Publish to NuGet
        shell: bash
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}"

      - name: Create release ZIPs
        if: steps.get_version.outputs.is_prerelease == 'false'
        run: |
          mkdir release-artifacts

          # Zip all NuGet packages
          cd artifacts
          zip -r -9 ../release-artifacts/PPWCode.AspNetCore.Host.I-nuget-pkgs_${{ steps.get_version.outputs.version }}.zip *.nupkg

      - name: Create GitHub Release
        if: steps.get_version.outputs.is_prerelease == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.zip
          generate_release_notes: false
          name: PPWCode.AspNetCore.Host.I ${{ steps.get_version.outputs.version }}
          body_path: release_body.md
          fail_on_unmatched_files: true
